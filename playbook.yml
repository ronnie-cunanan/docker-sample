- name: Deploy Docker image from AWS ECR
  hosts: web
  vars:
    aws_region: "{{ AWS_REGION }}"
    aws_account_id: "{{ AWS_ACCOUNT_ID }}"
    repo_name: "{{ ECR_REPO }}"
    image_tag: "{{ IMAGE_TAG }}"
    container_name: "{{ CONTAINER_NAME }}"
    registry_url: "{{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com"
    full_image: "{{ registry_url }}/{{ repo_name }}:{{ image_tag }}"

  tasks:
    - name: Log into ECR registry
      community.docker.docker_login:
        registry_url: "{{ registry_url }}"
        username: AWS
        # This native lookup replaces the shell 'aws ecr get-login-password'
        password: "{{ lookup('amazon.aws.aws_ecr_get_login_password', region=aws_region) }}"
        reauthorize: true

    - name: Pull image from ECR
      community.docker.docker_image:
        name: "{{ full_image }}"
        source: pull

    - name: Ensure container is running with latest image
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ full_image }}"
        state: started
        restart_policy: always
        recreate: true # Restarts only if the image or config changed
        published_ports:
          - "8081:5000"
